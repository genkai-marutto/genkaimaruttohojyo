<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>玄海町地域教育魅力化支援補助金 Q&Aフローチャート</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #dbeafe;
      --ok: #047857;
      --ok-bg: #d1fae5;
      --warn: #b45309;
      --warn-bg: #fef3c7;
      --ng: #b91c1c;
      --ng-bg: #fee2e2;
      --line: #e5e7eb;
      --shadow: 0 20px 45px rgba(15, 23, 42, .08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .13), transparent 34rem),
        linear-gradient(180deg, #fff 0%, var(--bg) 45%);
      min-height: 100vh;
    }

    .page {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.3fr .7fr;
      gap: 24px;
      align-items: end;
      margin-bottom: 22px;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: #1e40af;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: -.04em;
      line-height: 1.15;
    }

    .lead {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }

    .notice {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px 18px;
      line-height: 1.7;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .05);
    }

    .notice strong { color: var(--warn); }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      align-items: start;
    }

    .side,
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .side {
      padding: 20px;
      position: sticky;
      top: 18px;
    }

    .side-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 14px;
      letter-spacing: .04em;
    }

    .progress-track {
      height: 10px;
      background: #edf2f7;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), #06b6d4);
      transition: width .25s ease;
    }

    .path {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 56vh;
      overflow: auto;
      padding-right: 3px;
    }

    .path-item {
      border-left: 3px solid var(--primary-soft);
      padding-left: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    .path-item b {
      display: block;
      color: #111827;
      margin-bottom: 2px;
    }

    .side-actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .card {
      min-height: 560px;
      padding: clamp(22px, 4vw, 36px);
      overflow: hidden;
    }

    .question-no {
      color: var(--primary);
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: -.03em;
      line-height: 1.25;
    }

    .desc {
      color: var(--muted);
      line-height: 1.8;
      margin: 0 0 24px;
    }

    .choices {
      display: grid;
      gap: 12px;
    }

    .choice {
      width: 100%;
      text-align: left;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease, background .12s ease;
      font: inherit;
    }

    .choice:hover,
    .choice:focus-visible {
      outline: none;
      transform: translateY(-1px);
      border-color: #93c5fd;
      box-shadow: 0 12px 28px rgba(37, 99, 235, .12);
      background: #f8fbff;
    }

    .choice .icon {
      display: grid;
      place-items: center;
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: #1e40af;
      font-weight: 900;
    }

    .choice-title { font-weight: 800; margin-bottom: 3px; }
    .choice-note { color: var(--muted); font-size: 14px; line-height: 1.55; }

    .form {
      display: grid;
      gap: 14px;
      max-width: 600px;
    }

    label {
      display: grid;
      gap: 7px;
      font-weight: 750;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 13px;
      font: inherit;
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: 3px solid var(--primary-soft);
      border-color: #60a5fa;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      line-height: 1.5;
    }

    .error {
      display: none;
      color: var(--ng);
      background: var(--ng-bg);
      border: 1px solid #fecaca;
      border-radius: 14px;
      padding: 10px 12px;
      line-height: 1.55;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 11px 17px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      background: #eef2ff;
      color: #3730a3;
      transition: transform .12s ease, opacity .12s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn.primary { background: var(--primary); color: #fff; }
    .btn.ghost { background: #f3f4f6; color: #374151; }
    .btn.danger { background: #fee2e2; color: #991b1b; }

    .result {
      display: grid;
      gap: 16px;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 14px;
    }

    .badge.ok { color: var(--ok); background: var(--ok-bg); }
    .badge.warn { color: var(--warn); background: var(--warn-bg); }
    .badge.ng { color: var(--ng); background: var(--ng-bg); }

    .amount-box {
      border-radius: 20px;
      padding: 20px;
      background: linear-gradient(135deg, #eff6ff, #ecfeff);
      border: 1px solid #bfdbfe;
    }

    .amount-label {
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 4px;
    }

    .amount {
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 950;
      letter-spacing: -.05em;
      color: #0f172a;
      line-height: 1.1;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .mini-card {
      border: 1px solid var(--line);
      border-radius: 17px;
      padding: 15px;
      background: #fff;
      line-height: 1.7;
    }

    .mini-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    ul.clean {
      margin: 8px 0 0;
      padding-left: 1.15em;
      line-height: 1.8;
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-size: 14px;
    }

    .summary-table th,
    .summary-table td {
      border-bottom: 1px solid var(--line);
      padding: 11px 12px;
      text-align: left;
      vertical-align: top;
    }

    .summary-table th {
      width: 36%;
      background: #f9fafb;
      color: #374151;
    }

    .summary-table tr:last-child th,
    .summary-table tr:last-child td { border-bottom: 0; }

    .definition {
      margin-top: 22px;
      border-top: 1px dashed #d1d5db;
      padding-top: 18px;
    }

    details {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      background: #fff;
      margin-top: 10px;
    }

    summary {
      cursor: pointer;
      font-weight: 850;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 860px) {
      .hero,
      .app { grid-template-columns: 1fr; }
      .side { position: static; order: 2; }
      .card { min-height: auto; }
      .cards { grid-template-columns: 1fr; }
    }

    @media print {
      body { background: #fff; }
      .side, .btn-row, .hero .notice { display: none; }
      .page { width: 100%; padding: 0; }
      .app, .hero { display: block; }
      .card { box-shadow: none; border: 0; padding: 0; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="title">
      <div>
        <div class="eyebrow">Q&Aフローチャート</div>
        <h1 id="title">玄海町地域教育魅力化支援補助金 判定ナビ</h1>
        <p class="lead">質問に答えると、該当しそうな補助制度、概算の補助上限額、申請期限、確認ポイントを表示します。</p>
      </div>
      <aside class="notice">
        <strong>注意：</strong>この画面は保護者・生徒向けの目安です。最終的な交付可否・金額は、申請書類と町の審査で決定されます。
      </aside>
    </section>

    <section class="app">
      <aside class="side" aria-label="回答状況">
        <div class="side-title">回答の流れ</div>
        <div class="progress-track" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
        <div class="path" id="path"></div>
        <div class="side-actions">
          <button class="btn ghost" type="button" id="backBtn">1つ戻る</button>
          <button class="btn danger" type="button" id="resetBtn">はじめから</button>
        </div>
      </aside>

      <section class="card" id="card" aria-live="polite"></section>
    </section>
  </main>

  <script>
    const PREF_PRIVATE_CAR_ROUND_TRIP = {
      "大阪府": 50000,
      "兵庫県": 48000,
      "鳥取県": 45000,
      "島根県": 37000,
      "岡山県": 38000,
      "広島県": 26000,
      "山口県": 16000,
      "徳島県": 46000,
      "香川県": 41000,
      "高知県": 37000,
      "愛媛県": 27000,
      "福岡県": 5000,
      "長崎県": 9000,
      "熊本県": 12000,
      "大分県": 15000,
      "宮崎県": 25000,
      "鹿児島県": 25000,
      "上記以外（佐賀県を除く）": 50000
    };

    const state = {
      current: "start",
      answers: {},
      history: []
    };

    const card = document.getElementById("card");
    const path = document.getElementById("path");
    const progressBar = document.getElementById("progressBar");
    const backBtn = document.getElementById("backBtn");
    const resetBtn = document.getElementById("resetBtn");

    const yen = (n) => {
      const num = Number(n || 0);
      return new Intl.NumberFormat("ja-JP", { style: "currency", currency: "JPY", maximumFractionDigits: 0 }).format(num);
    };

    const escapeHtml = (str) => String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    const addDays = (dateString, days) => {
      if (!dateString) return "";
      const d = new Date(dateString + "T00:00:00");
      if (Number.isNaN(d.getTime())) return "";
      d.setDate(d.getDate() + days);
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
    };

    function go(nextId, answerKey, answerLabel, value = true) {
      state.history.push({ id: state.current, answers: { ...state.answers } });
      if (answerKey) state.answers[answerKey] = value;
      if (answerKey) state.answers[answerKey + "_label"] = answerLabel;
      state.current = nextId;
      render();
    }

    function back() {
      const previous = state.history.pop();
      if (!previous) return;
      state.current = previous.id;
      state.answers = previous.answers;
      render();
    }

    function reset() {
      state.current = "start";
      state.answers = {};
      state.history = [];
      render();
    }

    function renderShell(questionNo, title, desc, body) {
      card.innerHTML = `
        <div class="question-no">${escapeHtml(questionNo)}</div>
        <h2>${title}</h2>
        ${desc ? `<p class="desc">${desc}</p>` : ""}
        ${body}
      `;
      updateSide();
    }

    function renderChoices(questionNo, title, desc, choices) {
      const body = `<div class="choices">
        ${choices.map((choice, index) => `
          <button class="choice" type="button" data-next="${escapeHtml(choice.next)}" data-key="${escapeHtml(choice.key || "")}" data-label="${escapeHtml(choice.label)}" data-value="${escapeHtml(choice.value ?? choice.label)}">
            <span class="icon">${index + 1}</span>
            <span>
              <span class="choice-title">${escapeHtml(choice.label)}</span>
              ${choice.note ? `<span class="choice-note">${escapeHtml(choice.note)}</span>` : ""}
            </span>
          </button>
        `).join("")}
      </div>`;
      renderShell(questionNo, title, desc, body);
      card.querySelectorAll(".choice").forEach(btn => {
        btn.addEventListener("click", () => go(btn.dataset.next, btn.dataset.key, btn.dataset.label, btn.dataset.value));
      });
    }

    function renderForm(questionNo, title, desc, fields, onSubmit) {
      const body = `
        <form class="form" id="form" novalidate>
          ${fields.map(field => `
            <label>
              ${escapeHtml(field.label)}
              ${field.type === "select" ? `
                <select name="${escapeHtml(field.name)}" ${field.required ? "required" : ""}>
                  <option value="">選択してください</option>
                  ${field.options.map(opt => `<option value="${escapeHtml(opt.value ?? opt)}">${escapeHtml(opt.label ?? opt)}</option>`).join("")}
                </select>
              ` : `
                <input
                  name="${escapeHtml(field.name)}"
                  type="${escapeHtml(field.type || "text")}" 
                  inputmode="${escapeHtml(field.inputmode || "")}" 
                  min="${escapeHtml(field.min ?? "")}" 
                  max="${escapeHtml(field.max ?? "")}" 
                  step="${escapeHtml(field.step ?? "")}" 
                  placeholder="${escapeHtml(field.placeholder || "")}" 
                  ${field.required ? "required" : ""}
                />
              `}
              ${field.hint ? `<span class="hint">${escapeHtml(field.hint)}</span>` : ""}
            </label>
          `).join("")}
          <div class="error" id="formError"></div>
          <div class="btn-row">
            <button class="btn primary" type="submit">結果を見る</button>
            <button class="btn ghost" type="button" id="formBack">1つ戻る</button>
          </div>
        </form>
      `;
      renderShell(questionNo, title, desc, body);
      document.getElementById("formBack").addEventListener("click", back);
      document.getElementById("form").addEventListener("submit", (e) => {
        e.preventDefault();
        const formData = new FormData(e.currentTarget);
        const values = Object.fromEntries(formData.entries());
        const error = onSubmit(values);
        const errorBox = document.getElementById("formError");
        if (error) {
          errorBox.style.display = "block";
          errorBox.textContent = error;
        }
      });
    }

    function renderResult({ status = "ok", title, amountLabel, amount, rows = [], cards = [], notes = [], actions = true }) {
      const badgeText = status === "ok" ? "該当の可能性あり" : status === "warn" ? "要確認" : "該当しない可能性が高い";
      const amountHtml = amountLabel ? `
        <div class="amount-box">
          <div class="amount-label">${escapeHtml(amountLabel)}</div>
          <div class="amount">${escapeHtml(amount)}</div>
        </div>` : "";
      const rowsHtml = rows.length ? `
        <table class="summary-table">
          <tbody>
            ${rows.map(row => `<tr><th>${escapeHtml(row[0])}</th><td>${row[1]}</td></tr>`).join("")}
          </tbody>
        </table>` : "";
      const cardsHtml = cards.length ? `<div class="cards">${cards.map(c => `
        <div class="mini-card">
          <h3>${escapeHtml(c.title)}</h3>
          <div>${c.body}</div>
        </div>
      `).join("")}</div>` : "";
      const notesHtml = notes.length ? `<ul class="clean">${notes.map(n => `<li>${n}</li>`).join("")}</ul>` : "";
      const actionHtml = actions ? `
        <div class="btn-row">
          <button class="btn primary" type="button" id="printBtn">結果を印刷</button>
          <button class="btn ghost" type="button" id="restartBtn">別の補助を調べる</button>
          <button class="btn ghost" type="button" id="resultBackBtn">1つ戻る</button>
        </div>` : "";

      renderShell("結果", title, "", `
        <div class="result">
          <span class="badge ${status}">${badgeText}</span>
          ${amountHtml}
          ${rowsHtml}
          ${cardsHtml}
          ${notesHtml}
          ${definitionHtml()}
          ${actionHtml}
        </div>
      `);
      const printBtn = document.getElementById("printBtn");
      const restartBtn = document.getElementById("restartBtn");
      const resultBackBtn = document.getElementById("resultBackBtn");
      if (printBtn) printBtn.addEventListener("click", () => window.print());
      if (restartBtn) restartBtn.addEventListener("click", reset);
      if (resultBackBtn) resultBackBtn.addEventListener("click", back);
    }

    function definitionHtml() {
      return `
        <div class="definition">
          <details>
            <summary>用語・金額の前提を見る</summary>
            <ul class="clean">
              <li><b>げんかいみらい留学生：</b>唐津青翔高等学校に通学する目的で、玄海町内の下宿等を利用する学生。</li>
              <li><b>下宿等：</b>町内の下宿、間借り、民間賃貸住宅、民宿等。ただし、3親等以内の親族等が所有する持ち家等は除外。</li>
              <li><b>家賃等：</b>賃借料、宿泊費、下宿等の契約内容に含まれる経費。管理費、共益費、敷金礼金、仲介手数料等は除外。</li>
              <li><b>自家用車の交通費：</b>要綱別表第2の都道府県別往復額を使用。表にない都道府県は、佐賀県を除き一律50,000円。</li>
            </ul>
          </details>
        </div>
      `;
    }

    function updateSide() {
      backBtn.disabled = state.history.length === 0;
      const items = Object.entries(state.answers)
        .filter(([key]) => key.endsWith("_label"))
        .map(([key, label]) => {
          const baseKey = key.replace("_label", "");
          return `<div class="path-item"><b>${escapeHtml(label)}</b><span>${escapeHtml(readableKey(baseKey))}</span></div>`;
        });
      path.innerHTML = items.length ? items.join("") : `<div class="path-item"><b>未回答</b><span>最初の質問から始めてください。</span></div>`;
      const progress = Math.min(100, Math.round((state.history.length / 7) * 100));
      progressBar.style.width = `${progress}%`;
    }

    function readableKey(key) {
      const map = {
        route: "知りたい内容",
        status: "お子さん・申請者の状況",
        admission: "入学許可",
        lodging: "下宿等の利用",
        relativeHome: "親族所有住宅ではないこと",
        noArrears: "学校徴収金の滞納なし",
        jhs: "中学生であること",
        outsideSaga: "県外からの参加",
        trialJoin: "体験入学等への参加",
        firstTrial: "年度内1回限り",
        homeTrip: "帰省の往復",
        homeCount: "年度内回数",
        activityPurpose: "地域・教育魅力化の活動",
        consortium: "共同体での実施決定"
      };
      return map[key] || key;
    }

    function noResult(reason, nextTip) {
      renderResult({
        status: "ng",
        title: "この条件では対象外の可能性があります",
        rows: [
          ["理由", escapeHtml(reason)],
          ["次の確認", escapeHtml(nextTip || "条件を満たす別の補助制度がないか、町の窓口で確認してください。")]
        ],
        notes: ["入力内容に誤りがある場合は「1つ戻る」から修正できます。"]
      });
    }

    function warnResult(title, reason, nextTip) {
      renderResult({
        status: "warn",
        title,
        rows: [
          ["要確認の理由", escapeHtml(reason)],
          ["確認先・対応", escapeHtml(nextTip)]
        ],
        notes: ["この画面では最終判定はできません。申請前に町の担当窓口へ確認してください。"]
      });
    }

    function submitLife(values) {
      const months = Number(values.months);
      if (!Number.isInteger(months) || months < 1 || months > 36) {
        return "申請したい月数は1〜36の整数で入力してください。";
      }
      const period = values.period;

      result_regional_unclear() { warnResult("活動内容の趣旨適合を確認してください", "地域教育魅力化事業は、地域の活性化と教育の魅力化につながる事業が対象です。", "企画内容、対象経費、実施主体を整理し、町・高校等へ事前相談してください。補助額は予算の範囲内です。"); },
      result_regional_consult() { warnResult("共同体での実施決定が必要です", "対象となるのは、町・高校・一般社団法人玄海町みんなの地域商社で構成する共同体で決定した実施内容です。", "事前相談のうえ、共同体で実施内容が決定されるか確認してください。補助額は予算の範囲内です。"); },
      result_unknown() { warnResult("このナビでは該当制度を特定できませんでした", "入力された状況が、生活支援・体験入学等支援・帰省支援・地域教育魅力化事業の典型条件に当てはまりません。", "制度の対象になる特殊事情がないか、町の担当窓口で確認してください。元の画面に戻って別の入口から試すこともできます。"); },

      result_regional() {
        renderResult({
          status: "ok",
          title: "地域教育魅力化事業の対象となる可能性があります",
          amountLabel: "補助額",
          amount: "予算の範囲内",
          rows: [
            ["対象事業", "地域教育魅力化事業"],
            ["対象経費", "報償費、需用費、役務費、使用料 等"],
            ["申請対象者", "趣旨に基づいた活動を実施する者"],
            ["補助条件", "町・高校・一般社団法人玄海町みんなの地域商社で構成する共同体で決定した実施内容のうち、地域の活性化と教育の魅力化につながる事業。"],
            ["申請期限", "要綱別表には個別期限の記載がないため、町へ確認してください。"]
          ],
          cards: [
            { title: "保護者向け補助との違い", body: "生活支援・体験入学等支援・帰省支援のような定額上限ではなく、活動内容と予算の範囲で決まります。" },
            { title: "事前準備", body: "活動目的、実施内容、対象経費、見積、実施体制を整理して相談するとスムーズです。" }
          ],
          notes: ["交付申請書は様式第1号、交付請求書は様式第2号です。"]
        });
      }
    };

    function render() {
      const view = views[state.current];
      if (view) view();
      else views.start();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    backBtn.addEventListener("click", back);
    resetBtn.addEventListener("click", reset);
    render();
  </script>
